name: tests
on:
  # Every branch except calendar-state, the bot-managed .ics cache branch,
  # which carries no code or tests.
  push:
    branches-ignore: [calendar-state]
  pull_request:
    branches-ignore: [calendar-state]
  schedule:
    - cron: "0 0 * * 1"   # weekly (Mon 00:00 UTC): catch dependency-chain rot
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]   # oldest + newest supported
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install flake8
          python -m pip install --editable .[test]
      - name: Sanity check with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          python -m flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          python -m flake8 . --count --exit-zero --statistics
      - name: Test with pytest
        run: python -m pytest
