# pre-commit workflow
#
# Ensures the codebase passes the pre-commit stack.
# We run this on GHA to catch issues in commits from contributors who haven't
# set up pre-commit.

name: pre-commit

# Run on every branch except calendar-state, the bot-managed .ics cache
# branch, which carries no code for the stack to check.
on:
  push:
    branches-ignore: [calendar-state]
  pull_request:
    branches-ignore: [calendar-state]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: pip
    - uses: pre-commit/action@v3.0.0
